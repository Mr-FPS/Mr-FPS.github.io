name: Delete File from Host

on:
  workflow_dispatch:
    inputs:
      html_filename:
        description: 'HTML filename (e.g. file.jpg.html)'
        required: true

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Get original filename
        run: |
          ORIGINAL="${{ github.event.inputs.html_filename }}"
          STRIPPED="${ORIGINAL%.html}"
          echo "STRIPPED=$STRIPPED" >> $GITHUB_ENV

      - name: Delete from FTP
        run: |
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            "${{ secrets.FTP_HOST }}" <<EOF
          rm /public_html/uploads/${{ env.STRIPPED }}
          bye
          EOF
