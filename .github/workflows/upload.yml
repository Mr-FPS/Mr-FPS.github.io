name: Upload to Hosting
on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct link or Google Drive share link'
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Detect file info
        env:
          FILE_URL: ${{ github.event.inputs.file_url }}
        run: |
          if echo "$FILE_URL" | grep -q "drive.google.com"; then
            if echo "$FILE_URL" | grep -q '/d/'; then
              FILE_ID=$(echo "$FILE_URL" | grep -oP '(?<=/d/)[^/?]+')
            else
              FILE_ID=$(echo "$FILE_URL" | grep -oP '(?<=id=)[^&]+')
            fi
            echo "IS_GDRIVE=true" >> $GITHUB_ENV
            echo "GDRIVE_ID=$FILE_ID" >> $GITHUB_ENV
            
            # نام پیش‌فرض موقت، gdown خودش نام واقعی رو جایگزین می‌کنه
            echo "FILENAME=gdrive_file" >> $GITHUB_ENV
          else
            FILENAME=$(basename "$FILE_URL" | cut -d'?' -f1)
            echo "IS_GDRIVE=false" >> $GITHUB_ENV
            echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          fi

      - name: Download from Google Drive (Large File Support)
        if: env.IS_GDRIVE == 'true'
        run: |
          # استفاده از gdown برای دور زدن سیستم تایید ویروس گوگل
          gdown --id "${{ env.GDRIVE_ID }}" --remaining-ok
          
          # پیدا کردن نام واقعی فایلی که دانلود شده
          ACTUAL_NAME=$(ls -t | head -n 1)
          echo "FILENAME=$ACTUAL_NAME" >> $GITHUB_ENV
          echo "Downloaded: $ACTUAL_NAME ($(du -h "$ACTUAL_NAME" | cut -f1))"

      - name: Download direct file
        if: env.IS_GDRIVE == 'false'
        run: |
          # دانلود فایل با قابلیت ادامه در صورت قطعی شبکه (--retry)
          curl -L --retry 5 --retry-delay 3 "${{ github.event.inputs.file_url }}" -o "${{ env.FILENAME }}"

      - name: Check Content Type (Video Detect)
        run: |
          EXT=$(echo "${{ env.FILENAME }}" | grep -oP '\.[^.]+$' | tr '[:upper:]' '[:lower:]' | tr -d '.')
          if echo "mp4 mkv avi mov wmv flv webm m4v mpg mpeg 3gp ts m2ts" | grep -qw "$EXT"; then
            echo "IS_VIDEO=true" >> $GITHUB_ENV
          else
            echo "IS_VIDEO=false" >> $GITHUB_ENV
          fi

      - name: Upload file to FTP
        if: env.IS_GDRIVE == 'true' || env.IS_VIDEO == 'false'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Starting FTP upload for ${{ env.FILENAME }}..."
          
          # استفاده از آپلود کِرل با تکرار اتوماتیک در صورت قطعی اتصال (--retry)
          curl -v --retry 5 --retry-delay 5 -T "${{ env.FILENAME }}" \
            "ftp://$FTP_HOST/htdocs/uploads/${{ env.FILENAME }}" \
            --user "$FTP_USER:$FTP_PASS" \
            --ftp-create-dirs 2>&1 | tee ftp_log.txt

          if grep -q "226" ftp_log.txt; then
            echo "✅ File uploaded successfully: ${{ env.FILENAME }}"
          else
            echo "❌ Upload failed"
            cat ftp_log.txt
            exit 1
          fi

      - name: Create and upload Video.html
        if: env.IS_VIDEO == 'true'
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SITE_URL: ${{ secrets.SITE_URL }}
          FILE_URL: ${{ github.event.inputs.file_url }}
        run: |
          if [ "${{ env.IS_GDRIVE }}" == "true" ]; then
            VIDEO_SRC="$SITE_URL/uploads/${{ env.FILENAME }}"
          else
            VIDEO_SRC="$FILE_URL"
          fi

          # ساخت تمیز ساختار اچ‌تی‌ام‌ال بدون نیاز به دستور خطرناک sed
          cat << EOF > Video.html
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000}
video{width:100%;display:block}
</style>
</head>
<body>
<video controls playsinline>
<source src="$VIDEO_SRC">
</video>
</body>
</html>
EOF

          curl -v -T "Video.html" \
            "ftp://$FTP_HOST/htdocs/Video.html" \
            --user "$FTP_USER:$FTP_PASS" 2>&1 | tee ftp_log_html.txt

          if grep -q "226" ftp_log_html.txt; then
            echo "✅ Video.html uploaded"
          else
            echo "❌ Video.html upload failed"
            cat ftp_log_html.txt
            exit 1
          fi
